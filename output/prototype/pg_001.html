<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商城页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
      .wechat-style {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Open Sans',
          'Helvetica Neue', sans-serif;
      }
      .product-card {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .product-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      }
      .category-item.active {
        background-color: #f0f9ff;
        color: #0ea5e9;
        border-left: 4px solid #0ea5e9;
        font-weight: 500;
      }
      .price-original {
        color: #9ca3af;
        text-decoration: line-through;
      }
      .price-current {
        color: #ef4444;
        font-weight: bold;
      }
    </style>
  </head>
  <body class="wechat-style bg-gray-100">
    <div x-data="shoppingMallData()" class="flex h-screen">
      <!-- 左侧分类栏 -->
      <div class="w-64 bg-white shadow-md flex flex-col">
        <div class="p-4 border-b border-gray-200">
          <h2 class="text-xl font-bold text-gray-800">商品分类</h2>
        </div>
        <ul class="flex-1 overflow-y-auto py-2">
          <template x-for="category in categories" :key="category.id">
            <li>
              <button
                @click="selectCategory(category.id)"
                :class="{ 
                'category-item w-full text-left px-6 py-3 hover:bg-blue-50 transition-colors': true,
                'active': selectedCategory === category.id 
              }"
              >
                <span x-text="category.name"></span>
              </button>
            </li>
          </template>
        </ul>
        <div class="p-4 border-t border-gray-200">
          <div class="flex items-center justify-between">
            <span class="text-gray-600">购物车</span>
            <span
              class="bg-red-500 text-white text-xs rounded-full w-6 h-6 flex items-center justify-center"
              x-text="cartCount"
            ></span>
          </div>
        </div>
      </div>

      <!-- 右侧商品列表 -->
      <div class="flex-1 flex flex-col">
        <div class="p-4 border-b border-gray-200 bg-white">
          <h2 class="text-2xl font-bold text-gray-800" x-text="currentCategoryName"></h2>
        </div>

        <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <template x-for="product in filteredProducts" :key="product.id">
              <div class="bg-white rounded-lg shadow-sm overflow-hidden product-card">
                <div class="p-4">
                  <img :src="product.imageUrl" :alt="product.name" class="w-full h-48 object-contain rounded-md mb-3" />
                  <h3 class="font-semibold text-gray-800 mb-1 truncate" x-text="product.name"></h3>

                  <div class="mt-2">
                    <div class="flex items-center justify-between">
                      <span class="price-current" x-text="'¥' + product.memberPrice.toFixed(2)"></span>
                      <span class="price-original" x-text="'¥' + product.price.toFixed(2)"></span>
                    </div>

                    <div class="mt-3">
                      <button
                        @click="addToCart(product.id)"
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-md transition-colors"
                      >
                        加入购物车
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <div x-show="filteredProducts.length === 0" class="text-center py-12 text-gray-500">暂无商品</div>
        </div>
      </div>
    </div>

    <script>
      function shoppingMallData() {
        return {
          // 商品分类数据
          categories: [
            { id: 1, name: '手机数码' },
            { id: 2, name: '家用电器' },
            { id: 3, name: '服饰鞋包' },
            { id: 4, name: '美妆护肤' },
            { id: 5, name: '食品生鲜' },
            { id: 6, name: '家居用品' },
            { id: 7, name: '运动户外' },
            { id: 8, name: '图书文具' },
          ],

          // 商品数据
          products: [
            {
              id: 1,
              name: 'iPhone 15 Pro',
              price: 7999,
              memberPrice: 7499,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=iPhone',
              categoryId: 1,
            },
            {
              id: 2,
              name: 'MacBook Air M2',
              price: 8999,
              memberPrice: 8499,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=MacBook',
              categoryId: 1,
            },
            {
              id: 3,
              name: '小米电视65寸',
              price: 3999,
              memberPrice: 3699,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=TV',
              categoryId: 2,
            },
            {
              id: 4,
              name: '海尔冰箱双开门',
              price: 2999,
              memberPrice: 2799,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=Fridge',
              categoryId: 2,
            },
            {
              id: 5,
              name: '耐克运动鞋',
              price: 599,
              memberPrice: 549,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=Shoes',
              categoryId: 7,
            },
            {
              id: 6,
              name: '阿迪达斯T恤',
              price: 299,
              memberPrice: 269,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=T-Shirt',
              categoryId: 3,
            },
            {
              id: 7,
              name: '兰蔻小黑瓶',
              price: 1080,
              memberPrice: 980,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=Sku',
              categoryId: 4,
            },
            {
              id: 8,
              name: '进口牛奶',
              price: 89,
              memberPrice: 79,
              imageUrl: 'https://via.placeholder.com/200x200/cccccc/969696?text=Milk',
              categoryId: 5,
            },
          ],

          selectedCategory: 1,
          cart: [],

          // 计算属性：当前选中分类的名称
          get currentCategoryName() {
            const category = this.categories.find(cat => cat.id === this.selectedCategory)
            return category ? category.name : ''
          },

          // 计算属性：当前分类下的商品
          get filteredProducts() {
            return this.products.filter(product => product.categoryId === this.selectedCategory)
          },

          // 计算属性：购物车商品数量
          get cartCount() {
            return this.cart.reduce((total, item) => total + item.quantity, 0)
          },

          // 选择分类
          selectCategory(categoryId) {
            this.selectedCategory = categoryId
          },

          // 添加商品到购物车
          addToCart(productId) {
            const existingItem = this.cart.find(item => item.productId === productId)
            if (existingItem) {
              existingItem.quantity += 1
            } else {
              this.cart.push({ productId, quantity: 1 })
            }

            // 显示添加成功提示
            alert('商品已加入购物车')
          },
        }
      }
    </script>
  </body>
</html>
